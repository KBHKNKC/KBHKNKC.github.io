<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>壁纸欣赏 - KBH</title>
    <link rel="stylesheet" href="css/blog.css" />
    <link rel="icon" href="img/kbh.svg" type="image/svg+xml" />
    <style>
        .wallpapers-page {
            padding: 40px 20px;
        }

        .wallpapers-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .wallpapers-header h1 {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .wallpapers-header p {
            color: var(--text-muted);
            font-size: 15px;
        }

        .wallpaper-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .wallpaper-card {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 16/10;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .wallpaper-card:hover {
            transform: scale(1.02);
        }

        .wallpaper-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }

        .wallpaper-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 16px;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            color: #fff;
        }

        .wallpaper-title {
            font-size: 14px;
            font-weight: 600;
        }

        .wallpaper-size {
            font-size: 12px;
            opacity: 0.8;
        }

        .wp-gradient-1 { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .wp-gradient-2 { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .wp-gradient-3 { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .wp-gradient-4 { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
        .wp-gradient-5 { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
        .wp-gradient-6 { background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%); }
        .wp-gradient-7 { background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%); }
        .wp-gradient-8 { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); }

        @media (max-width: 768px) {
            .wallpaper-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-inner">
            <a href="index.html" class="logo">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 40" class="logo-svg">
                    <defs>
                        <linearGradient gradientUnits="userSpaceOnUse" y2="2" x2="0" y1="38" x1="0" id="kbh-gradient">
                            <stop stop-color="#973BED" />
                            <stop stop-color="#007CFF" offset="1" />
                        </linearGradient>
                    </defs>
                    <text x="10" y="28" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="url(#kbh-gradient)" class="kbh-text">KBH</text>
                </svg>
            </a>
            <div class="header-actions">
                <button class="search-btn" id="searchBtn" title="搜索">🔍</button>
                <button class="theme-toggle" id="themeToggle" title="切换主题">🌙</button>
            </div>
        </div>
    </header>

    <!-- Layout -->
    <div class="layout">
        <!-- Left Sidebar: Navigation -->
        <nav class="side-nav" id="mainNav">
            <a href="index.html" class="side-nav-item">首页</a>
            <a href="quotes.html" class="side-nav-item">语录</a>
            <a href="contact.html" class="side-nav-item">联系</a>
            <a href="sticky-wall.html" class="side-nav-item">便签墙</a>
            <a href="wallpapers.html" class="side-nav-item active">壁纸欣赏</a>
            <a href="links.html" class="side-nav-item">友链</a>
            <a href="about.html" class="side-nav-item">关于</a>
        </nav>

        <!-- Main Content -->
        <div class="article-scroll">
            <div class="wallpapers-page">
                <div class="wallpapers-header">
                    <h1>🖼️ 壁纸欣赏</h1>
                    <p>精选高清壁纸，装点你的屏幕</p>
                </div>
                <div class="wallpaper-grid" id="wallpaperGrid"></div>
            </div>
        </div>

        <!-- Right Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-widget profile-widget">
                <div class="avatar">
                    <img src="img/hero.png" alt="作者头像" />
                </div>
                <div class="name">KBH</div>
                <div class="bio">技术爱好者，分享AI与开发经验</div>
            </div>
        </aside>
    </div>

    <script src="js/blog.js"></script>
    <script>
        const wallpapers = [
            { title: '紫色渐变', emoji: '🌌', gradient: 'wp-gradient-1', size: '3840 x 2160' },
            { title: '粉色梦幻', emoji: '🌸', gradient: 'wp-gradient-2', size: '3840 x 2160' },
            { title: '海洋蓝调', emoji: '🌊', gradient: 'wp-gradient-3', size: '2560 x 1440' },
            { title: '清新绿野', emoji: '🌿', gradient: 'wp-gradient-4', size: '3840 x 2160' },
            { title: '暖阳橙光', emoji: '🌅', gradient: 'wp-gradient-5', size: '2560 x 1440' },
            { title: '薰衣草紫', emoji: '💜', gradient: 'wp-gradient-6', size: '3840 x 2160' },
            { title: '蜜桃甜心', emoji: '🍑', gradient: 'wp-gradient-7', size: '2560 x 1440' },
            { title: '樱花粉黛', emoji: '🌺', gradient: 'wp-gradient-8', size: '3840 x 2160' }
        ];

        function renderWallpapers() {
            const grid = document.getElementById('wallpaperGrid');
            if (!grid) return;

            grid.innerHTML = wallpapers.map(function(wp) {
                return '<div class="wallpaper-card">' +
                    '<div class="wallpaper-placeholder ' + wp.gradient + '">' + wp.emoji + '</div>' +
                    '<div class="wallpaper-overlay">' +
                        '<div class="wallpaper-title">' + wp.title + '</div>' +
                        '<div class="wallpaper-size">' + wp.size + '</div>' +
                    '</div>' +
                '</div>';
            }).join('');
        }

        document.addEventListener('DOMContentLoaded', renderWallpapers);
    </script>
</body>
</html>
