<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>语录 - KBH</title>
    <link rel="stylesheet" href="css/blog.css" />
    <link rel="icon" href="img/kbh.svg" type="image/svg+xml" />
    <style>
        .quotes-page {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .quotes-header {
            text-align: center;
            margin-bottom: 48px;
        }

        .quotes-header h1 {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .quotes-header p {
            color: var(--text-muted);
            font-size: 15px;
        }

        .quotes-list {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .quote-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 32px;
            position: relative;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .quote-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
        }

        .quote-card::before {
            content: '"';
            position: absolute;
            top: 12px;
            left: 20px;
            font-size: 72px;
            color: var(--primary-color);
            opacity: 0.15;
            font-family: Georgia, serif;
            line-height: 1;
        }

        .quote-content {
            font-size: 18px;
            line-height: 1.8;
            color: var(--text-primary);
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .quote-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
        }

        .quote-author {
            font-size: 14px;
            color: var(--text-muted);
        }

        .quote-source {
            font-size: 13px;
            color: var(--text-secondary);
            font-style: italic;
        }

        .quote-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .quote-tag {
            background: var(--primary-color);
            color: #fff;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            .quotes-page {
                padding: 24px 16px;
            }

            .quote-card {
                padding: 24px;
            }

            .quote-content {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-inner">
            <a href="index.html" class="logo">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 40" class="logo-svg">
                    <defs>
                        <linearGradient gradientUnits="userSpaceOnUse" y2="2" x2="0" y1="38" x1="0" id="kbh-gradient">
                            <stop stop-color="#973BED" />
                            <stop stop-color="#007CFF" offset="1" />
                        </linearGradient>
                    </defs>
                    <text x="10" y="28" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="url(#kbh-gradient)" class="kbh-text">KBH</text>
                </svg>
            </a>
            <div class="header-actions">
                <button class="search-btn" id="searchBtn" title="搜索">🔍</button>
                <button class="theme-toggle" id="themeToggle" title="切换主题">🌙</button>
            </div>
        </div>
    </header>

    <!-- Layout -->
    <div class="layout">
        <!-- Left Sidebar: Navigation -->
        <nav class="side-nav" id="mainNav">
            <a href="index.html" class="side-nav-item">首页</a>
            <a href="quotes.html" class="side-nav-item active">语录</a>
            <a href="contact.html" class="side-nav-item">联系</a>
            <a href="sticky-wall.html" class="side-nav-item">便签墙</a>
            <a href="wallpapers.html" class="side-nav-item">壁纸欣赏</a>
            <a href="links.html" class="side-nav-item">友链</a>
            <a href="about.html" class="side-nav-item">关于</a>
        </nav>

        <!-- Main Content -->
        <div class="article-scroll">
            <div class="quotes-page">
                <div class="quotes-header">
                    <h1>📜 语录集</h1>
                    <p>收集那些触动心灵的话语</p>
                </div>
                <div class="quotes-list" id="quotesList">
                    <!-- Quotes will be rendered here -->
                </div>
            </div>
        </div>

        <!-- Right Sidebar -->
        <aside class="sidebar">
            <!-- Profile Widget -->
            <div class="sidebar-widget profile-widget">
                <div class="avatar">
                    <img src="img/hero.png" alt="作者头像" />
                </div>
                <div class="name">KBH</div>
                <div class="bio">技术爱好者，分享AI与开发经验</div>
            </div>
        </aside>
    </div>

    <script src="js/blog.js"></script>
    <script>
        // Quotes data
        const quotes = [
            {
                content: "生活不是等待暴风雨过去，而是学会在雨中跳舞。",
                author: "维维安·格林",
                source: "",
                tags: ["生活", "励志"]
            },
            {
                content: "世界上只有一种英雄主义，就是看清生活的真相之后依然热爱生活。",
                author: "罗曼·罗兰",
                source: "《米开朗基罗传》",
                tags: ["励志", "哲理"]
            },
            {
                content: "你不需要很优秀才能开始，但你需要开始才能变得优秀。",
                author: "齐格·金克拉",
                source: "",
                tags: ["成长", "励志"]
            },
            {
                content: "技术本身没有善恶，关键在于使用它的人。",
                author: "KBH",
                source: "原创",
                tags: ["技术", "思考"]
            },
            {
                content: "最好的投资就是投资自己。",
                author: "本杰明·富兰克林",
                source: "",
                tags: ["成长", "财富"]
            },
            {
                content: "代码是写给人看的，只是偶尔让机器执行一下。",
                author: "Harold Abelson",
                source: "《计算机程序的构造和解释》",
                tags: ["编程", "技术"]
            },
            {
                content: "简单是终极的复杂。",
                author: "达·芬奇",
                source: "",
                tags: ["哲理", "设计"]
            },
            {
                content: "不要温和地走进那个良夜。",
                author: "狄兰·托马斯",
                source: "诗歌",
                tags: ["文学", "励志"]
            }
        ];

        // Render quotes
        function renderQuotes() {
            const container = document.getElementById('quotesList');
            if (!container) return;

            container.innerHTML = quotes.map(function(quote) {
                const tagsHtml = quote.tags.map(function(tag) {
                    return '<span class="quote-tag">' + tag + '</span>';
                }).join('');

                return '<div class="quote-card">' +
                    '<div class="quote-content">' + quote.content + '</div>' +
                    '<div class="quote-tags">' + tagsHtml + '</div>' +
                    '<div class="quote-meta">' +
                        '<span class="quote-author">— ' + quote.author + '</span>' +
                        (quote.source ? '<span class="quote-source">' + quote.source + '</span>' : '') +
                    '</div>' +
                '</div>';
            }).join('');
        }

        document.addEventListener('DOMContentLoaded', renderQuotes);
    </script>
</body>
</html>
