<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>便签墙 - KBH-千载楠逢</title>
    <link rel="stylesheet" href="css/blog.css" />
    <link rel="icon" href="img/kbh.svg" type="image/svg+xml" />
    <style>
        .sticky-wall-page {
            padding: 40px 20px;
            min-height: calc(100vh - 60px);
        }

        .sticky-wall-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .sticky-wall-header h1 {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .sticky-wall-header p {
            color: var(--text-muted);
            font-size: 15px;
        }

        .board {
            position: relative;
            width: 100%;
            min-height: 500px;
            background-image: 
                linear-gradient(0deg, rgba(0,0,0,0.03) 1px, transparent 0),
                linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 0);
            background-size: 30px 30px;
            border-radius: 16px;
            overflow: hidden;
        }

        .note {
            position: absolute;
            width: 200px;
            min-height: 120px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .note:hover {
            transform: scale(1.05) !important;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            z-index: 100;
        }

        .note-header {
            padding: 10px 12px;
            font-size: 12px;
            font-weight: 600;
            color: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .note-body {
            padding: 8px 12px 14px;
            font-size: 14px;
            line-height: 1.6;
            color: rgba(0, 0, 0, 0.75);
            word-break: break-word;
        }

        .color-yellow { background: #fff7d9; }
        .color-pink { background: #ffe0e3; }
        .color-blue { background: #d9f0ff; }
        .color-green { background: #d9f5e6; }
        .color-purple { background: #e8d9ff; }
        .color-orange { background: #ffe8d9; }

        @media (max-width: 768px) {
            .note {
                width: 160px;
                min-height: 100px;
            }
            .note-body {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-inner">
            <a href="index.html" class="logo">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 40" class="logo-svg">
                    <defs>
                        <linearGradient gradientUnits="userSpaceOnUse" y2="2" x2="0" y1="38" x1="0" id="kbh-gradient">
                            <stop stop-color="#973BED" />
                            <stop stop-color="#007CFF" offset="1" />
                        </linearGradient>
                    </defs>
                    <text x="10" y="28" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="url(#kbh-gradient)" class="kbh-text">KBH</text>
                </svg>
            </a>
            <div class="header-actions">
                <button class="search-btn" id="searchBtn" title="搜索">🔍</button>
                <button class="theme-toggle" id="themeToggle" title="切换主题">🌙</button>
            </div>
        </div>
    </header>

    <!-- Layout -->
    <div class="layout">
        <!-- Left Sidebar: Navigation -->
        <nav class="side-nav" id="mainNav">
            <a href="index.html" class="side-nav-item">首页</a>
            <a href="quotes.html" class="side-nav-item">语录</a>
            <a href="contact.html" class="side-nav-item">联系</a>
            <a href="sticky-wall.html" class="side-nav-item active">便签墙</a>
            <a href="wallpapers.html" class="side-nav-item">壁纸欣赏</a>
            <a href="links.html" class="side-nav-item">友链</a>
            <a href="about.html" class="side-nav-item">关于</a>
        </nav>

        <!-- Main Content -->
        <div class="article-scroll">
            <div class="sticky-wall-page">
                <div class="sticky-wall-header">
                    <h1>📌 便签墙</h1>
                    <p>那些随机飘过的温馨小提示</p>
                </div>
                <div class="board" id="board"></div>
            </div>
        </div>

        <!-- Right Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-widget profile-widget">
                <div class="avatar">
                    <img src="img/tx1.png" alt="作者头像" />
                </div>
                <div class="name">KBH</div>
                <div class="bio">技术爱好者，分享AI与开发经验</div>
            </div>
        </aside>
    </div>

    <script src="js/blog.js"></script>
    <script>
        const board = document.getElementById('board');
        const messages = [
            '保持好心情', '多喝水哦', '今天辛苦啦', '早点休息',
            '记得吃水果', '加油，你可以的', '祝你顺利', '保持微笑呀',
            '愿所有烦恼都消失', '期待下一次见面', '梦想总会实现',
            '天气冷了，多穿衣服', '记得给自己放松', '每天都要元气满满',
            '今天也要好好爱自己', '适当休息一下', '相信自己的选择',
            '慢慢来，比较快', '你已经很棒了'
        ];

        const colors = ['color-yellow', 'color-pink', 'color-blue', 'color-green', 'color-purple', 'color-orange'];

        function randomFrom(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function createNote() {
            const note = document.createElement('div');
            note.className = 'note ' + randomFrom(colors);

            const maxX = Math.max(board.offsetWidth - 220, 20);
            const maxY = Math.max(500 - 140, 20);
            const left = 20 + Math.random() * maxX;
            const top = 20 + Math.random() * maxY;
            const angle = (Math.random() - 0.5) * 8;

            note.style.left = left + 'px';
            note.style.top = top + 'px';
            note.style.transform = 'rotate(' + angle + 'deg)';

            note.innerHTML = 
                '<div class="note-header">💡 温馨提示</div>' +
                '<div class="note-body">' + randomFrom(messages) + '</div>';

            board.appendChild(note);
        }

        // Create initial notes
        for (let i = 0; i < 20; i++) {
            setTimeout(createNote, i * 50);
        }
    </script>
</body>
</html>
