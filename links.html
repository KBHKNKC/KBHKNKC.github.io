<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>友链 - KBH</title>
    <link rel="stylesheet" href="css/blog.css" />
    <link rel="icon" href="img/logo.png" type="image/png" />
    <style>
        .links-page {
            padding: 40px 20px;
        }

        .links-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .links-header h1 {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .links-header p {
            color: var(--text-muted);
            font-size: 15px;
        }

        .links-section {
            margin-bottom: 40px;
        }

        .links-section-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 20px;
            padding-left: 12px;
            border-left: 4px solid var(--primary-color);
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .link-card {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            text-decoration: none;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .link-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .link-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }

        .link-info {
            flex: 1;
            min-width: 0;
        }

        .link-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .link-desc {
            font-size: 13px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .link-form {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 32px;
        }

        .link-form h3 {
            font-size: 20px;
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: var(--primary-color);
        }

        .form-submit {
            background: var(--primary-color);
            color: #fff;
            border: none;
            padding: 12px 32px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .form-submit:hover {
            opacity: 0.9;
        }

        .avatar-gradient-1 { background: linear-gradient(135deg, #667eea, #764ba2); }
        .avatar-gradient-2 { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .avatar-gradient-3 { background: linear-gradient(135deg, #4facfe, #00f2fe); }
        .avatar-gradient-4 { background: linear-gradient(135deg, #43e97b, #38f9d7); }
        .avatar-gradient-5 { background: linear-gradient(135deg, #fa709a, #fee140); }
        .avatar-gradient-6 { background: linear-gradient(135deg, #a18cd1, #fbc2eb); }

        @media (max-width: 768px) {
            .links-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-inner">
            <a href="index.html" class="logo">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 40" class="logo-svg">
                    <defs>
                        <linearGradient gradientUnits="userSpaceOnUse" y2="2" x2="0" y1="38" x1="0" id="kbh-gradient">
                            <stop stop-color="#973BED" />
                            <stop stop-color="#007CFF" offset="1" />
                        </linearGradient>
                    </defs>
                    <text x="10" y="28" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="url(#kbh-gradient)" class="kbh-text">KBH</text>
                </svg>
            </a>
            <div class="header-actions">
                <button class="search-btn" id="searchBtn" title="搜索">🔍</button>
                <button class="theme-toggle" id="themeToggle" title="切换主题">🌙</button>
            </div>
        </div>
    </header>

    <!-- Layout -->
    <div class="layout">
        <!-- Left Sidebar: Navigation -->
        <nav class="side-nav" id="mainNav">
            <a href="index.html" class="side-nav-item">首页</a>
            <a href="quotes.html" class="side-nav-item">语录</a>
            <a href="contact.html" class="side-nav-item">联系</a>
            <a href="sticky-wall.html" class="side-nav-item">便签墙</a>
            <a href="wallpapers.html" class="side-nav-item">壁纸欣赏</a>
            <a href="links.html" class="side-nav-item active">友链</a>
            <a href="about.html" class="side-nav-item">关于</a>
        </nav>

        <!-- Main Content -->
        <div class="article-scroll">
            <div class="links-page">
                <div class="links-header">
                    <h1>🔗 友情链接</h1>
                    <p>与优秀的朋友交换链接，共同成长</p>
                </div>

                <div class="links-section">
                    <h2 class="links-section-title">🌟 推荐友链</h2>
                    <div class="links-grid">
                        <a href="https://example1.com" target="_blank" class="link-card">
                            <div class="link-avatar avatar-gradient-1">📝</div>
                            <div class="link-info">
                                <div class="link-name">技术博客A</div>
                                <div class="link-desc">分享前端开发技术与实践经验</div>
                            </div>
                        </a>
                        <a href="https://example2.com" target="_blank" class="link-card">
                            <div class="link-avatar avatar-gradient-2">💻</div>
                            <div class="link-info">
                                <div class="link-name">开发者笔记</div>
                                <div class="link-desc">记录编程路上的点滴思考</div>
                            </div>
                        </a>
                        <a href="https://example3.com" target="_blank" class="link-card">
                            <div class="link-avatar avatar-gradient-3">🎨</div>
                            <div class="link-info">
                                <div class="link-name">设计灵感</div>
                                <div class="link-desc">UI/UX设计案例与教程分享</div>
                            </div>
                        </a>
                        <a href="https://example4.com" target="_blank" class="link-card">
                            <div class="link-avatar avatar-gradient-4">🤖</div>
                            <div class="link-info">
                                <div class="link-name">AI探索者</div>
                                <div class="link-desc">人工智能技术应用与研究</div>
                            </div>
                        </a>
                    </div>
                </div>

                <div class="links-section">
                    <div class="link-form">
                        <h3>📮 申请友链</h3>
                        <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 20px;">
                            如果您想与本站交换链接，请提供以下信息：
                        </p>
                        <div class="form-group">
                            <label>网站名称</label>
                            <input type="text" placeholder="请输入您的网站名称" />
                        </div>
                        <div class="form-group">
                            <label>网站地址</label>
                            <input type="text" placeholder="https://" />
                        </div>
                        <div class="form-group">
                            <label>网站描述</label>
                            <input type="text" placeholder="一句话描述您的网站" />
                        </div>
                        <div class="form-group">
                            <label>头像/Logo URL</label>
                            <input type="text" placeholder="https://" />
                        </div>
                        <button class="form-submit" onclick="alert('申请已提交，审核通过后将显示！')">提交申请</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-widget profile-widget">
                <div class="avatar">
                    <img src="img/hero.png" alt="作者头像" />
                </div>
                <div class="name">KBH</div>
                <div class="bio">技术爱好者，分享AI与开发经验</div>
            </div>
        </aside>
    </div>

    <script src="js/blog.js"></script>
</body>
</html>
