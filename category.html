<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>分类 - KBH</title>
    <link rel="stylesheet" href="css/blog.css" />
    <link rel="icon" href="img/kbh.svg" type="image/svg+xml" />
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-inner">
            <a href="index.html" class="logo">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 40" class="logo-svg">
                    <defs>
                        <linearGradient gradientUnits="userSpaceOnUse" y2="2" x2="0" y1="38" x1="0" id="kbh-gradient">
                            <stop stop-color="#973BED" />
                            <stop stop-color="#007CFF" offset="1" />
                        </linearGradient>
                    </defs>
                    <text x="10" y="28" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="url(#kbh-gradient)" class="kbh-text">KBH</text>
                </svg>
            </a>
            <div class="header-actions">
                <button class="search-btn" id="searchBtn" title="搜索">🔍</button>
                <button class="theme-toggle" id="themeToggle" title="切换主题">🌙</button>
            </div>
        </div>
    </header>

    <!-- Layout -->
    <div class="layout">
        <!-- Left Sidebar: Navigation -->
        <nav class="side-nav" id="mainNav">
            <a href="index.html" class="side-nav-item">首页</a>
            <a href="quotes.html" class="side-nav-item">语录</a>
            <a href="contact.html" class="side-nav-item">联系</a>
            <a href="sticky-wall.html" class="side-nav-item">便签墙</a>
            <a href="wallpapers.html" class="side-nav-item">壁纸欣赏</a>
            <a href="links.html" class="side-nav-item">友链</a>
            <a href="about.html" class="side-nav-item">关于</a>
        </nav>

        <!-- Main Content -->
        <div class="article-scroll">
            <div class="page-header" id="pageHeader" style="padding: 40px 20px 20px;">
                <h1 id="categoryTitle" style="font-size: 24px; color: var(--text-primary); margin-bottom: 8px;">分类</h1>
                <p id="categoryDesc" style="color: var(--text-muted);">加载中...</p>
            </div>
            <div class="article-list" id="categoryArticles" style="padding: 0 20px 20px;">
                <!-- Articles will be rendered here -->
            </div>
        </div>

        <!-- Right Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-widget profile-widget">
                <div class="avatar">
                    <img src="img/hero.png" alt="作者头像" />
                </div>
                <div class="name">KBH</div>
                <div class="bio">技术爱好者，分享AI与开发经验</div>
            </div>
        </aside>
    </div>

    <script src="js/blog.js"></script>
    <script src="js/category.js"></script>
</body>
</html>
