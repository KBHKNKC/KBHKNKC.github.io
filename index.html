<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KBH - 技术博客</title>
    <meta name="description" content="KBH - 技术博客，分享AI、Linux运维、软件开发等技术内容">
    <meta name="keywords" content="AI, 大模型, Agent, Linux, 技术博客">
    <link rel="stylesheet" href="css/blog.css" />
    <link rel="icon" href="img/logo.png" type="image/png" />
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-inner">
            <a href="index.html" class="logo">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 40" class="logo-svg">
                    <defs>
                        <linearGradient gradientUnits="userSpaceOnUse" y2="2" x2="0" y1="38" x1="0" id="kbh-gradient">
                            <stop stop-color="#973BED" />
                            <stop stop-color="#007CFF" offset="1" />
                        </linearGradient>
                    </defs>
                    <text x="10" y="28" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="url(#kbh-gradient)" class="kbh-text">KBH</text>
                </svg>
            </a>
            <div class="header-actions">
                <button class="search-btn" id="searchBtn" title="搜索">🔍</button>
                <button class="theme-toggle" id="themeToggle" title="切换主题">🌙</button>
            </div>
        </div>
    </header>

    <!-- Layout -->
    <div class="layout">
        <!-- Left Sidebar: Navigation -->
        <nav class="side-nav" id="mainNav">
            <a href="index.html" class="side-nav-item active">首页</a>
            <a href="quotes.html" class="side-nav-item">语录</a>
            <a href="contact.html" class="side-nav-item">联系</a>
            <a href="sticky-wall.html" class="side-nav-item">便签墙</a>
            <a href="wallpapers.html" class="side-nav-item">壁纸欣赏</a>
            <a href="links.html" class="side-nav-item">友链</a>
            <a href="about.html" class="side-nav-item">关于</a>
        </nav>

        <!-- Middle: Scrollable Article List -->
        <div class="article-scroll">
            <div class="article-list" id="articleList">
                <!-- Articles will be rendered here by JavaScript -->
            </div>
        </div>

        <!-- Right Sidebar -->
        <aside class="sidebar">
            <!-- Profile Widget -->
            <div class="sidebar-widget profile-widget">
                <div class="avatar">
                    <img src="img/hero.png" alt="作者头像" />
                </div>
                <div class="name" id="authorName">KBH</div>
                <div class="bio" id="authorBio">技术爱好者，分享AI与开发经验</div>
                <div class="stats">
                    <div class="stat">
                        <div class="stat-num" id="articleCount">0</div>
                        <div class="stat-label">文章</div>
                    </div>
                    <div class="stat">
                        <div class="stat-num" id="categoryCount">0</div>
                        <div class="stat-label">分类</div>
                    </div>
                    <div class="stat">
                        <div class="stat-num" id="tagCount">0</div>
                        <div class="stat-label">标签</div>
                    </div>
                </div>
            </div>

            <!-- Category Widget -->
            <div class="sidebar-widget">
                <h3 class="widget-title">📂 文章分类</h3>
                <ul class="category-list" id="categoryList">
                    <!-- Categories will be rendered here -->
                </ul>
            </div>

            <!-- Hot Posts Widget -->
            <div class="sidebar-widget">
                <h3 class="widget-title">🔥 热门文章</h3>
                <ul class="hot-list" id="hotList">
                    <!-- Hot posts will be rendered here -->
                </ul>
            </div>

            <!-- Tags Widget -->
            <div class="sidebar-widget">
                <h3 class="widget-title">🏷️ 标签云</h3>
                <div class="tag-cloud" id="tagCloud">
                    <!-- Tags will be rendered here -->
                </div>
            </div>
        </aside>
    </div>

    <script src="js/blog.js"></script>
</body>
</html>
